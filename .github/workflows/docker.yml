name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Log in to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }} 
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2 

    # Backend Docker Build and Push
    - name: Build and push backend Docker image
      run: |
        cd backend
        docker build -t peixuan911/2025cloud:backend .
        docker push peixuan911/2025cloud:backend

    # Frontend Docker Build and Push
    - name: Build and push frontend Docker image
      run: |
        cd frontend
        docker build -t peixuan911/2025cloud:frontend .
        docker push peixuan911/2025cloud:frontend

    - name: Logout from DockerHub
      run: docker logout  # 退出 Docker Hub 登入
